<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>添興家具｜詳細作品展示</title>
    <style>
        @font-face {
            font-family: 'CheckpointFont';
            src: url('checkpoint.ttf?v=2') format('truetype');
            font-display: swap;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body { 
            font-family: 'CheckpointFont', sans-serif; 
            color: #4a3c31; 
            background-color: #fafafa;
            background-image: 
                linear-gradient(rgba(176, 196, 222, 0.4) 1px, transparent 1px),
                linear-gradient(90deg, rgba(176, 196, 222, 0.4) 1px, transparent 1px);
            background-size: 20px 20px;
            -webkit-tap-highlight-color: transparent; 
            overscroll-behavior-y: none; 
            
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .main-content {
            flex: 1 0 auto;
        }

        .site-header-bar, .site-footer-bar {
            width: 100%;
            height: 35px;
            background-color: #1e3d6b;
            background-image: 
                radial-gradient(rgba(255,255,255,0.15) 1px, transparent 0),
                radial-gradient(rgba(0,0,0,0.1) 1px, transparent 0);
            background-size: 4px 4px;
            background-position: 0 0, 2px 2px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
            flex-shrink: 0;
        }

        .site-header-bar {
            margin-bottom: 20px;
        }

        .site-footer-bar {
            margin-top: 60px;
        }

        .header-logo { position: absolute; top: 55px; right: 25px; max-width: 120px; }
        
        .back-btn { 
            position: absolute; 
            top: 55px; 
            left: 25px; 
            background: #fff9c4; 
            color: #4a3c31; 
            border: 1px solid #e0e0e0; 
            padding: 8px 18px; 
            border-radius: 0px; 
            cursor: pointer; 
            font-size: 1.1rem; 
            font-family: 'CheckpointFont', sans-serif; 
            box-shadow: 2px 2px 5px rgba(0,0,0,0.05); 
            transform: rotate(-2deg); 
            transition: transform 0.2s;
            z-index: 5; 
            font-weight: normal; 
        }
        .back-btn:hover { transform: rotate(0deg) scale(1.05); }

        .section-title { 
            color: #4a3c31; 
            font-size: 2rem; 
            text-align: center; 
            margin: 110px 0 40px 0; 
            white-space: nowrap; 
            letter-spacing: 2px;
            font-weight: normal; 
        }
        
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; padding: 0 20px; box-sizing: border-box; }
        .card { background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.08); cursor: pointer; padding: 10px; box-sizing: border-box;}
        .card img { width: 100%; aspect-ratio: 4/3; object-fit: cover; pointer-events: none; border-radius: 2px;}
        .video-container { max-width: 800px; margin: 50px auto; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 10px; background: #fff;}
        
        #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 99999; justify-content: center; align-items: center; overflow: hidden; touch-action: none; }
        #lightbox-img { max-width: 100vw; max-height: 85vh; object-fit: contain; margin: auto; cursor: grab; transform-origin: center; transition: transform 0.1s ease-out; }
        #lightbox-img:active { cursor: grabbing; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); color: rgba(255, 255, 255, 0.3); font-size: 3.5rem; cursor: pointer; user-select: none; padding: 15px; transition: color 0.3s; z-index: 10; font-family: sans-serif; }
        .nav-btn:hover { color: rgba(255, 255, 255, 0.9); }
        #prev { left: 10px; } 
        #next { right: 10px; }
        .close-btn { position: absolute; top: 20px; right: 20px; color: white; font-size: 2.5rem; cursor: pointer; z-index: 100000; width: 50px; height: 50px; text-align: center; line-height: 50px; font-family: sans-serif;}
        .dots-container { position: absolute; bottom: 30px; left: 0; width: 100%; display: flex; justify-content: center; gap: 10px; z-index: 10; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255, 255, 255, 0.4); cursor: pointer; transition: background 0.3s; }
       @media (max-width: 767px) { 
    .nav-btn { display: none !important; } 
    .section-title { font-size: 1.4rem; margin: 100px 0 20px 0; } /* 手機版專屬：字變小、間距變窄 */
}       
    </style>
</head>
<body>

    <div class="main-content">
        <div class="site-header-bar"></div>

        <button class="back-btn" onclick="window.location.href='index.html'">返回首頁</button>
        <img src="0-logo-02.png" alt="添興家具" class="header-logo">
        <h2 class="section-title">B款 客製書桌櫃架高床</h2>

        <div class="gallery">
            <div class="card" onclick="openItem(event, 0)"><img src="7.webp" alt="7"></div>
            <div class="card" onclick="openItem(event, 1)"><img src="8.webp" alt="8"></div>
            <div class="card" onclick="openItem(event, 2)"><img src="9.webp" alt="9"></div>
            <div class="card" onclick="openItem(event, 3)"><img src="10.webp" alt="10"></div>
        </div>

        <div class="video-container" id="my-video-box">
            <video width="100%" controls>
                <source src="0422訂製書桌書櫃架高床.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <div id="lightbox">
        <div class="close-btn" onclick="closeItem(event)">✕</div>
        <span class="nav-btn" id="prev" onclick="changeImage(event, -1)">&#10094;</span>
        <img id="lightbox-img" src="" alt="放大圖" draggable="false">
        <span class="nav-btn" id="next" onclick="changeImage(event, 1)">&#10095;</span>
        <div class="dots-container" id="dots-container"></div>
    </div>

    <script>
        var images = ["7.webp", "8.webp", "9.webp", "10.webp"];
        var currentIndex = 0;
        var scale = 1; var translateX = 0, translateY = 0; var lastTranslateX = 0; var lastTranslateY = 0;
        var isDragging = false; var startX, startY;
        var startDist = 0; var touchStartX = 0, touchStartY = 0; var lastTapTime = 0; 
        var isLightboxOpen = false;

        var dotsContainer = document.getElementById('dots-container');
        images.forEach((_, i) => {
            let dot = document.createElement('div');
            dot.className = 'dot';
            dot.onclick = (e) => { e.stopPropagation(); openItem(e, i); };
            dotsContainer.appendChild(dot);
        });

        function updateDots() {
            let dots = document.querySelectorAll('.dot');
            dots.forEach((dot, i) => {
                dot.style.background = (i === currentIndex) ? 'white' : 'rgba(255,255,255,0.4)';
            });
        }

        function applyTransform() { document.getElementById('lightbox-img').style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`; }
        function resetZoom() { scale = 1; translateX = 0; translateY = 0; lastTranslateX = 0; lastTranslateY = 0; applyTransform(); }

        function openItem(e, index) {
            if(e) { e.preventDefault(); e.stopPropagation(); }
            currentIndex = index; resetZoom();
            document.getElementById('lightbox-img').src = images[currentIndex];
            document.getElementById('lightbox').style.display = 'flex';
            document.getElementById('my-video-box').style.visibility = 'hidden';
            updateDots();
            if (!isLightboxOpen) { history.pushState({ lightbox: true }, ""); isLightboxOpen = true; }
        }
        
        function closeItem(e, fromPopState = false) {
            if(e) { e.preventDefault(); e.stopPropagation(); }
            document.getElementById('lightbox').style.display = 'none';
            document.getElementById('my-video-box').style.visibility = 'visible';
            if (isLightboxOpen && !fromPopState) { isLightboxOpen = false; history.back(); } else { isLightboxOpen = false; }
        }

        window.addEventListener('popstate', (e) => { if (isLightboxOpen) { closeItem(null, true); } });

        function changeImage(e, step) {
            if(e) { e.preventDefault(); e.stopPropagation(); }
            currentIndex = (currentIndex + step + images.length) % images.length;
            document.getElementById('lightbox-img').src = images[currentIndex];
            resetZoom(); updateDots();
        }

        const lightboxBox = document.getElementById('lightbox');
        lightboxBox.addEventListener('wheel', (e) => {
            if(document.getElementById('lightbox').style.display === 'flex') {
                e.preventDefault();
                scale += e.deltaY * -0.002;
                scale = Math.min(Math.max(1, scale), 4);
                if (scale === 1) { translateX = 0; translateY = 0; lastTranslateX = 0; lastTranslateY = 0; }
                applyTransform();
            }
        }, {passive: false});

        lightboxBox.addEventListener('mousedown', (e) => {
            if (scale > 1) { isDragging = true; startX = e.clientX; startY = e.clientY; }
        });
        lightboxBox.addEventListener('mousemove', (e) => {
            if (isDragging && scale > 1) {
                translateX = lastTranslateX + (e.clientX - startX);
                translateY = lastTranslateY + (e.clientY - startY);
                applyTransform();
            }
        });
        lightboxBox.addEventListener('mouseup', () => { if (isDragging) { isDragging = false; lastTranslateX = translateX; lastTranslateY = translateY; } });
        lightboxBox.addEventListener('mouseleave', () => { isDragging = false; });

        lightboxBox.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY;
                if (scale > 1) { isDragging = true; startX = e.touches[0].clientX; startY = e.touches[0].clientY; }
            } else if (e.touches.length === 2) {
                startDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            }
        }, {passive: false});

        lightboxBox.addEventListener('touchmove', (e) => {
            if(document.getElementById('lightbox').style.display !== 'flex') return;
            e.preventDefault(); 
            if (e.touches.length === 1 && isDragging && scale > 1) {
                translateX = lastTranslateX + (e.touches[0].clientX - startX);
                translateY = lastTranslateY + (e.touches[0].clientY - startY);
                let maxTx = (window.innerWidth * scale - window.innerWidth) / 2;
                let maxTy = (window.innerHeight * scale - window.innerHeight) / 2;
                translateX = Math.max(-maxTx, Math.min(maxTx, translateX));
                translateY = Math.max(-maxTy, Math.min(maxTy, translateY));
                applyTransform();
            } else if (e.touches.length === 2) {
                let dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                let newScale = scale * (dist / startDist);
                scale = Math.min(Math.max(1, newScale), 4);
                startDist = dist; 
                if (scale === 1) { translateX = 0; translateY = 0; lastTranslateX = 0; lastTranslateY = 0; }
                applyTransform();
            }
        }, {passive: false});

        lightboxBox.addEventListener('touchend', (e) => {
            if (isDragging) { isDragging = false; lastTranslateX = translateX; lastTranslateY = translateY; }
            let touchEndX = e.changedTouches[0].clientX;
            let touchEndY = e.changedTouches[0].clientY;
            let moveDist = Math.hypot(touchEndX - touchStartX, touchEndY - touchStartY);
            let currentTime = new Date().getTime();
            let tapLength = currentTime - lastTapTime;
            
            if (tapLength < 300 && tapLength > 0 && moveDist < 10 && e.changedTouches.length === 1) {
                resetZoom(); e.preventDefault();
            } else if (e.changedTouches.length === 1 && scale === 1) {
                let diff = touchStartX - touchEndX;
                if (diff > 50) { changeImage(null, 1); } else if (diff < -50) { changeImage(null, -1); }
            }
            lastTapTime = currentTime;
        });
    </script>

    <div class="site-footer-bar"></div>

</body>
</html>
