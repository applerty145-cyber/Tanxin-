<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>添興家具｜詳細作品展示</title>
    <style>
        @font-face {
            font-family: 'CheckpointFont';
            src: url('checkpoint.ttf') format('truetype');
            font-display: swap;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body { 
            font-family: 'CheckpointFont', sans-serif; 
            color: #4a3c31; 
            background-color: #fafafa;
            background-image: 
                linear-gradient(rgba(176, 196, 222, 0.4) 1px, transparent 1px),
                linear-gradient(90deg, rgba(176, 196, 222, 0.4) 1px, transparent 1px);
            background-size: 20px 20px;
            -webkit-tap-highlight-color: transparent; 
            overscroll-behavior-y: none; 
            
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* [新增] 全螢幕網頁載入等待動畫樣式 */
        #page-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #fafafa; /* 保持與背景一致 */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999999; /* 確保在最上層 */
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        /* 轉圈圈動畫本體 */
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(30, 61, 107, 0.1);
            border-radius: 50%;
            border-top-color: #1e3d6b; /* 使用頁尾的深藍色 */
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .main-content {
            flex: 1 0 auto;
        }

        /* 頁首與頁尾的深藍色紙質感樣式 */
        .site-header-bar, .site-footer-bar {
            width: 100%;
            height: 35px;
            background-color: #1e3d6b;
            background-image: 
                radial-gradient(rgba(255,255,255,0.15) 1px, transparent 0),
                radial-gradient(rgba(0,0,0,0.1) 1px, transparent 0);
            background-size: 4px 4px;
            background-position: 0 0, 2px 2px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
            flex-shrink: 0;
        }

        .site-header-bar {
            margin-bottom: 20px;
        }

        .site-footer-bar {
            margin-top: 60px;
        }

        .header-logo { position: absolute; top: 55px; right: 25px; max-width: 120px; }
        
        .back-btn { 
            position: absolute; 
            top: 55px; 
            left: 25px; 
            background: #fff9c4; 
            color: #4a3c31; 
            border: 1px solid #e0e0e0; 
            padding: 8px 18px; 
            border-radius: 0px; 
            cursor: pointer; 
            font-size: 1.1rem; 
            font-family: 'CheckpointFont', sans-serif; 
            box-shadow: 2px 2px 5px rgba(0,0,0,0.05); 
            transform: rotate(-2deg); 
            transition: transform 0.2s;
            z-index: 5; 
            font-weight: normal; /* [修改] 確保按鈕文字也保持正常粗細 */
        }
        .back-btn:hover { transform: rotate(0deg) scale(1.05); }

        .section-title { 
            color: #4a3c31; 
            font-size: 2rem; 
            text-align: center; 
            margin: 110px 0 40px 0; 
            white-space: nowrap; 
            letter-spacing: 2px; 
            font-weight: normal; /* [修改] 移除瀏覽器預設粗體，保持原字體優雅細線 */
        }
        
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; padding: 0 20px; box-sizing: border-box; }
        .card { background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.08); cursor: pointer; padding: 10px; box-sizing: border-box;}
        .card img { width: 100%; aspect-ratio: 4/3; object-fit: cover; pointer-events: none; border-radius: 2px;}
        .video-container { max-width: 800px; margin: 50px auto; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 10px; background: #fff;}
        
        #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 99999; justify-content: center; align-items: center; overflow: hidden; touch-action: none; }
        #lightbox-img { max-width: 100vw; max-height: 85vh; object-fit: contain; margin: auto; cursor: grab; transform-origin: center; transition: transform 0.1s ease-out; }
        #lightbox-img:active { cursor: grabbing; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); color: rgba(255, 255, 255, 0.3); font-size: 3.5rem; cursor: pointer; user-select: none; padding: 15px; transition: color 0.3s; z-index: 10; font-family: sans-serif; }
        .nav-btn:hover { color: rgba(255, 255, 255, 0.9); }
        #prev { left: 10px; } 
        #next { right: 10px; }
        .close-btn { position: absolute; top: 20px; right: 20px; color: white; font-size: 2.5rem; cursor: pointer; z-index: 100000; width: 50px; height: 50px; text-align: center; line-height: 50px; font-family: sans-serif;}
        .dots-container { position: absolute; bottom: 30px; left: 0; width: 100%; display: flex; justify-content: center; gap: 10px; z-index: 10; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255, 255, 255, 0.4); cursor: pointer; transition: background 0.3s; }
       @media (max-width: 767px) { 
    .nav-btn { display: none !important; } 
    .section-title { font-size: 1.4rem; margin: 100px 0 20px 0; } /* 手機版專屬：字變小、間距變窄 */
}       
    </style>
</head>
<body>

    <div id="page-loader">
        <div class="spinner"></div>
    </div>

    <div class="main-content">
        <div class="site-header-bar"></div>

        <button class="back-btn" onclick="window.location.href='index.html'">返回首頁</button>
        <img src="0-logo-02.png" alt="添興家具" class="header-logo">
        <h2 class="section-title">D款 客製收納衣櫃架高床</h2>

        <div class="gallery">
            <div class="card" onclick="openItem(event, 0)"><img src="20.webp" alt="1"></div>
            <div class="card" onclick="openItem(event, 1)"><img src="21.webp" alt="2"></div>
            <div class="card" onclick="openItem(event, 2)"><img src="22.webp" alt="3"></div>
            <div class="card" onclick="openItem(event, 3)"><img src="23.webp" alt="4"></div>
        </div>

        <div class="video-container" id="my-video-box">
            <video width="100%" controls>
                <source src=".mp4">
            </video>
        </div>
    </div>

    <div id="lightbox">
        <div class="close-btn" onclick="closeItem(event)">✕</div>
        <span class="nav-btn" id="prev" onclick="changeImage(event, -1)">&#10094;</span>
        <img id="lightbox-img" src="" alt="放大圖" draggable="false">
        <span class="nav-btn" id="next" onclick="changeImage(event, 1)">&#10095;</span>
        <div class="dots-container" id="dots-container"></div>
    </div>

        var images = ["20.webp", "21.webp", "22.webp", "23.webp"];
        var currentIndex = 0;
        var scale = 1; var translateX = 0, translateY = 0; var lastTranslateX = 0; var lastTranslateY = 0;
        var isDragging = false; var startX, startY;
        var startDist = 0; var touchStartX = 0, touchStartY = 0; var lastTapTime = 0; 
        var isLightboxOpen = false;
