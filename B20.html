<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>添興家具｜詳細作品展示</title>
    <style>
        @font-face {
            font-family: 'CheckpointFont';
            src: url('checkpoint.ttf') format('truetype');
            font-display: swap;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body { 
            font-family: 'CheckpointFont', sans-serif; 
            color: #4a3c31; 
            background-color: #fafafa;
            background-image: 
                linear-gradient(rgba(176, 196, 222, 0.4) 1px, transparent 1px),
                linear-gradient(90deg, rgba(176, 196, 222, 0.4) 1px, transparent 1px);
            background-size: 20px 20px;
            -webkit-tap-highlight-color: transparent; 
            overscroll-behavior-y: none; 
            
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .main-content {
            flex: 1 0 auto;
        }

        /* 頁首與頁尾的深藍色紙質感樣式 */
        .site-header-bar, .site-footer-bar {
            width: 100%;
            height: 35px;
            background-color: #1e3d6b;
            background-image: 
                radial-gradient(rgba(255,255,255,0.15) 1px, transparent 0),
                radial-gradient(rgba(0,0,0,0.1) 1px, transparent 0);
            background-size: 4px 4px;
            background-position: 0 0, 2px 2px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
            flex-shrink: 0;
        }

        .site-header-bar {
            margin-bottom: 20px;
        }

        .site-footer-bar {
            margin-top: 60px;
        }

            left: 25px;
